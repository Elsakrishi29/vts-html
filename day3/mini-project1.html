<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title> Data Dashboard Snippet </title>
	</head>
<body>
	<header>
		<h1>Metrics Dashboards</h1>
	</header>	

	<!-- Key Metrics Section -->
	<section>
		<figure>
			<img src="image/download.png" alt="Total Sales Metric">
			<figcaption>Total Sales: 45,000</figcaption>
		</figure>

		<figure>
			<img src="image/download.png" alt="New Users Metric">
			<figcaption>New Users: 120</figcaption>
		</figure>
	</section>

	<!-- Recent Transactions Section -->
	<section>
		<h2>Recent Transactions</h2>

		<table border="1">
			<caption>Last 3 Transactions</caption>
			<thead>
				<tr>
					<th>Date</th>
					<th>Description</th>
					<th>Amount</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>01-03-2026</td>
					<td>Online Purchase</td>
					<td>1,200</td>
				</tr>
				<tr>
					<td>02-03-2026</td>
					<td>Subscription Payment</td>
					<td>500</td>
				</tr>
				<tr>
					<td>03-03-2026</td>
					<td>Grocery Shopping</td>
					<td>2,300</td>
				</tr>

				<!-- Colspan Row -->
				<tr>
					<td colspan="2"><strong>Total Amount</strong></td>
					<td><strong>4,000</strong></td>
				</tr>

			</tbody>
		</table>
	</section>
</body>
</html>
